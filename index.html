<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Alisufiyan Shaikh — Loud Richy | International Free Fire Esports Athlete, IGL, Guild Founder"/>
<title>LOUD RICHY — International Esports Athlete</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,500;0,700;0,800;1,700&family=Share+Tech+Mono&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ══════════════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════════════ */
:root{
  --void:#020305;
  --deep:#070a0f;
  --panel:rgba(10,14,22,.85);
  --glass:rgba(255,255,255,.03);
  --border:rgba(255,107,0,.12);
  --fire:#ff6a00;
  --fire2:#ffb347;
  --gold:#ffd700;
  --platinum:#e5e4e2;
  --ice:#00d4ff;
  --red:#ff2244;
  --green:#00ff88;
  --text:#dce4f0;
  --muted:#4a5872;
  --white:#ffffff;
  --gfire:0 0 30px rgba(255,106,0,.6);
  --gfire2:0 0 60px rgba(255,106,0,.3);
  --ggold:0 0 20px rgba(255,215,0,.5);
  --gice:0 0 20px rgba(0,212,255,.4);
  --radius-sm:4px;
  --radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--void);
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  overflow-x:hidden;
  cursor:none;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--void);}
::-webkit-scrollbar-thumb{background:var(--fire);border-radius:2px;}

/* ══════════════════════════════════════════════
   CURSOR
══════════════════════════════════════════════ */
#cur{position:fixed;width:8px;height:8px;background:var(--fire);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:var(--gfire);transition:transform .08s,background .2s;}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid var(--fire);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;transition:width .2s,height .2s,border-color .2s,opacity .2s;}

/* ══════════════════════════════════════════════
   3D CANVAS
══════════════════════════════════════════════ */
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ══════════════════════════════════════════════
   LOADER
══════════════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:10000;
  background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  transition:opacity .8s ease, visibility .8s ease;
}
#loader.hidden{opacity:0;visibility:hidden;}
.loader-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:4rem;letter-spacing:.3em;
  color:var(--white);
  animation:logoPulse 1.5s ease infinite;
}
.loader-logo em{color:var(--fire);font-style:normal;text-shadow:var(--gfire);}
@keyframes logoPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.loader-bar-bg{width:240px;height:2px;background:rgba(255,106,0,.2);}
.loader-bar-fill{height:100%;background:var(--fire);width:0%;animation:loadFill 2s ease forwards;box-shadow:var(--gfire);}
@keyframes loadFill{to{width:100%;}}
.loader-txt{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.3em;color:var(--muted);animation:txtCycle 2s steps(1) infinite;}

/* ══════════════════════════════════════════════
   NAV
══════════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:800;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3.5rem;height:64px;
  background:rgba(2,3,5,.75);
  backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.45rem;letter-spacing:.15em;color:var(--white);
  display:flex;align-items:center;gap:.5rem;
}
.nav-logo em{color:var(--fire);font-style:normal;text-shadow:var(--gfire);}
.nav-live{display:flex;align-items:center;gap:.4rem;font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--green);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
nav ul{display:flex;gap:2.5rem;list-style:none;}
nav a{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.18em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s;position:relative;}
nav a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--fire);transform:scaleX(0);transform-origin:left;transition:transform .25s;}
nav a:hover{color:var(--fire);}
nav a:hover::after{transform:scaleX(1);}
#nav-clock{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.12em;color:var(--muted);}

/* ══════════════════════════════════════════════
   HERO
══════════════════════════════════════════════ */
.hero{
  min-height:100vh;position:relative;z-index:1;
  display:flex;flex-direction:column;justify-content:center;
  padding:120px 4rem 4rem;
  overflow:hidden;
}
.hero-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 75% 75% at 30% 50%,rgba(255,106,0,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 80% 80%,rgba(0,212,255,.04) 0%,transparent 60%),
             linear-gradient(180deg,rgba(2,3,5,0) 60%,rgba(2,3,5,1) 100%);
  pointer-events:none;
}

.hero-eyebrow{
  display:flex;align-items:center;gap:1rem;
  font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.35em;color:var(--fire);
  margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s .3s ease forwards;
}
.hero-eyebrow::before{content:'';width:36px;height:1px;background:var(--fire);}

.hero-flag-strip{
  display:flex;gap:.6rem;margin-bottom:2rem;
  opacity:0;animation:fadeUp .8s .4s ease forwards;
}
.flag-pill{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.15em;
  padding:.3rem .8rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
}

.hero-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4.5rem,14vw,12rem);
  line-height:.85;letter-spacing:.02em;
  opacity:0;animation:fadeUp .9s .5s ease forwards;
}
.hn-loud{color:var(--white);}
.hn-richy{
  color:transparent;
  -webkit-text-stroke:2px var(--fire);
  position:relative;display:inline-block;
}
/* 3D extrude effect on hero name */
.hn-richy::before{
  content:'RICHY';
  position:absolute;top:4px;left:4px;
  color:transparent;
  -webkit-text-stroke:2px rgba(255,106,0,.2);
  z-index:-1;
}
.hn-richy::after{
  content:'RICHY';
  position:absolute;top:8px;left:8px;
  color:transparent;
  -webkit-text-stroke:2px rgba(255,106,0,.08);
  z-index:-2;
}

.hero-title-row{
  display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
  margin-top:1.2rem;
  opacity:0;animation:fadeUp .8s .65s ease forwards;
}
.hero-title-text{
  font-size:1.1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
}
.hero-title-text strong{color:var(--text);}
.divider-fire{width:1px;height:24px;background:rgba(255,106,0,.4);}

.hero-quote-block{
  margin-top:2.2rem;max-width:640px;
  opacity:0;animation:fadeUp .8s .8s ease forwards;
}
.hqb-line{width:40px;height:2px;background:var(--fire);margin-bottom:1rem;box-shadow:var(--gfire);}
.hqb-text{
  font-size:1.05rem;font-weight:500;font-style:italic;
  color:rgba(220,228,240,.6);line-height:1.7;
}
.hqb-text em{color:var(--fire);font-style:normal;font-weight:700;}

.hero-cta-row{
  display:flex;gap:1rem;flex-wrap:wrap;
  margin-top:2.5rem;
  opacity:0;animation:fadeUp .8s .95s ease forwards;
}

/* floating KPI cards */
.hero-kpis{
  position:absolute;right:4rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:1rem;
  opacity:0;animation:fadeUp .9s 1.1s ease forwards;
}
.kpi-card{
  background:rgba(10,14,22,.8);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  padding:1rem 1.5rem 1rem 1.2rem;
  border-left:3px solid var(--fire);
  position:relative;overflow:hidden;
  min-width:180px;
  transition:transform .2s,border-color .2s;
}
.kpi-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,106,0,.06) 0%,transparent 60%);
}
.kpi-card:hover{transform:translateX(-4px);}
.kpi-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--fire);text-shadow:var(--gfire);line-height:1;}
.kpi-lbl{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.18em;color:var(--muted);margin-top:.2rem;}

/* scroll indicator */
.scroll-ind{
  position:absolute;bottom:2.5rem;left:4rem;
  display:flex;align-items:center;gap:.8rem;
  opacity:0;animation:fadeUp .8s 1.4s ease forwards;
}
.si-line{width:40px;height:1px;background:linear-gradient(90deg,var(--fire),transparent);animation:siPulse 2s infinite;}
@keyframes siPulse{0%,100%{opacity:.3;width:20px;}50%{opacity:1;width:40px;}}
.si-txt{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn{
  font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.2em;
  padding:.75rem 2rem;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;
  cursor:pointer;border:none;transition:all .22s;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .2s;}
.btn:hover::after{opacity:1;}
.btn-fire{background:linear-gradient(135deg,var(--fire),#ff9a00);color:#000;font-weight:700;}
.btn-fire:hover{box-shadow:var(--gfire2);transform:translateY(-2px);}
.btn-glass{background:rgba(255,255,255,.05);color:var(--fire);border:1px solid rgba(255,106,0,.35);backdrop-filter:blur(12px);}
.btn-glass:hover{background:rgba(255,106,0,.1);box-shadow:var(--gfire);transform:translateY(-2px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ffb347);color:#000;}
.btn-gold:hover{box-shadow:var(--ggold);transform:translateY(-2px);}

/* ══════════════════════════════════════════════
   TICKER
══════════════════════════════════════════════ */
.ticker-wrap{
  position:relative;z-index:2;
  background:linear-gradient(90deg,var(--fire),#ff9500);
  padding:.5rem 0;overflow:hidden;border-top:1px solid rgba(255,255,255,.1);
}
.ticker-track{display:inline-flex;animation:tick 28s linear infinite;white-space:nowrap;}
.ticker-track span{
  font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.18em;color:#000;padding:0 2.5rem;
}
.ticker-track span::after{content:'✦';margin-left:2.5rem;opacity:.4;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ══════════════════════════════════════════════
   SECTION SHARED
══════════════════════════════════════════════ */
.section{padding:7rem 4rem;position:relative;z-index:2;}
.section-dark{background:rgba(7,10,15,.92);backdrop-filter:blur(8px);}
.max-w{max-width:1200px;margin:0 auto;}

.s-head{display:flex;align-items:center;gap:1.2rem;margin-bottom:4rem;}
.s-num{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--fire);}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--white);letter-spacing:.08em;}
.s-title em{color:var(--fire);font-style:normal;}
.s-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ══════════════════════════════════════════════
   STATS RIBBON
══════════════════════════════════════════════ */
.ribbon{
  position:relative;z-index:2;
  display:grid;grid-template-columns:repeat(6,1fr);
  background:rgba(5,8,12,.95);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.r-item{
  padding:2rem 1.2rem;text-align:center;
  position:relative;transition:background .3s;
}
.r-item:hover{background:rgba(255,106,0,.04);}
.r-item+.r-item::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--border);}
.r-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--fire);text-shadow:var(--gfire);line-height:1;}
.r-lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--muted);margin-top:.3rem;text-transform:uppercase;}
.r-trend{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--green);margin-top:.2rem;}

/* ══════════════════════════════════════════════
   ACHIEVEMENTS — PREMIUM CARDS
══════════════════════════════════════════════ */
.ach-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);
  border:1px solid var(--border);
}
.ach-card{
  background:var(--panel);
  backdrop-filter:blur(16px);
  padding:2rem;
  position:relative;overflow:hidden;
  transition:all .3s;
  cursor:default;
}
/* 3D tilt via JS */
.ach-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--fire),transparent);
  opacity:0;transition:opacity .3s;
}
.ach-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,106,0,.08) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.ach-card:hover{background:rgba(14,18,28,.95);transform:translateY(-3px);}
.ach-card:hover::before{opacity:1;}
.ach-card:hover::after{opacity:1;}

.ac-tier{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.25em;
  margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem;
}
.tier-dot{width:6px;height:6px;border-radius:50%;}
.tier-gold .tier-dot{background:var(--gold);box-shadow:var(--ggold);}
.tier-gold .tier-label{color:var(--gold);}
.tier-platinum .tier-dot{background:var(--platinum);box-shadow:0 0 8px rgba(229,228,226,.5);}
.tier-platinum .tier-label{color:var(--platinum);}
.tier-fire .tier-dot{background:var(--fire);box-shadow:var(--gfire);}
.tier-fire .tier-label{color:var(--fire);}
.tier-ice .tier-dot{background:var(--ice);box-shadow:var(--gice);}
.tier-ice .tier-label{color:var(--ice);}

.ac-rank{
  font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;
  margin-bottom:.5rem;
}
.ac-game{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:var(--fire2);margin-bottom:.8rem;}
.ac-title{font-size:1rem;font-weight:800;color:var(--white);margin-bottom:.5rem;letter-spacing:.04em;}
.ac-desc{font-size:.88rem;font-weight:500;color:var(--muted);line-height:1.55;}
.ac-date{
  font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.15em;
  color:rgba(74,88,114,.6);margin-top:1.2rem;
  display:flex;align-items:center;gap:.5rem;
}
.ac-date::before{content:'';width:16px;height:1px;background:var(--border);}

.ac-medal{
  position:absolute;top:1.5rem;right:1.5rem;
  font-size:1.8rem;filter:drop-shadow(0 0 8px rgba(255,215,0,.4));
}
.ac-verified{
  position:absolute;top:1.5rem;right:4rem;
  font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.1em;
  color:var(--green);display:flex;align-items:center;gap:.3rem;
}
.ac-verified::before{content:'✓';font-size:.8rem;}

/* ══════════════════════════════════════════════
   INTERNATIONAL SECTION
══════════════════════════════════════════════ */
.intl-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}
.intl-map-placeholder{
  background:rgba(10,14,22,.9);border:1px solid var(--border);
  padding:2.5rem;display:flex;flex-direction:column;gap:1.5rem;
  position:relative;overflow:hidden;min-height:360px;
}
.intl-map-placeholder::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 30% 60%,rgba(255,106,0,.04) 0%,transparent 40%),
    radial-gradient(circle at 80% 20%,rgba(0,212,255,.03) 0%,transparent 40%);
}
.world-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,106,0,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,106,0,.04) 1px,transparent 1px);
  background-size:30px 30px;
}
.intl-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--white);letter-spacing:.06em;position:relative;z-index:1;}
.intl-subtitle{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--fire);position:relative;z-index:1;}
.intl-pins{display:flex;flex-direction:column;gap:.8rem;position:relative;z-index:1;}
.ipin{
  display:flex;align-items:center;gap:.8rem;
  padding:.7rem 1rem;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,106,0,.08);
  transition:border-color .2s,background .2s;
}
.ipin:hover{border-color:rgba(255,106,0,.3);background:rgba(255,106,0,.04);}
.ipin-flag{font-size:1.1rem;}
.ipin-info{display:flex;flex-direction:column;}
.ipin-country{font-weight:700;font-size:.85rem;color:var(--text);}
.ipin-detail{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--muted);}

.intl-stats{display:flex;flex-direction:column;gap:1rem;}
.istat-card{
  background:rgba(10,14,22,.9);
  border:1px solid var(--border);border-left:3px solid var(--fire);
  padding:1.3rem 1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color .2s;
}
.istat-card:hover{border-left-color:var(--fire2);border-color:rgba(255,106,0,.25);}
.istat-key{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.15em;color:var(--muted);}
.istat-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--white);}
.istat-val em{color:var(--fire);font-style:normal;}

/* ══════════════════════════════════════════════
   GUILD — 3D PREMIUM
══════════════════════════════════════════════ */
.guild-hero{
  background:rgba(10,14,22,.92);border:1px solid var(--border);
  padding:4rem;display:flex;gap:4rem;align-items:center;
  position:relative;overflow:hidden;backdrop-filter:blur(20px);
}
.guild-hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 20% 50%,rgba(255,106,0,.07) 0%,transparent 60%),
    repeating-linear-gradient(-45deg,transparent 0px,transparent 30px,rgba(255,106,0,.015) 30px,rgba(255,106,0,.015) 31px);
}
.guild-emblem-3d{
  flex-shrink:0;
  width:200px;height:200px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}
.ge-outer{
  position:absolute;inset:0;border:1px solid rgba(255,106,0,.2);
  transform:rotate(45deg);
  animation:rotateOuter 12s linear infinite;
}
.ge-inner{
  position:absolute;inset:20px;border:1px solid rgba(255,106,0,.1);
  transform:rotate(-45deg);
  animation:rotateOuter 8s linear infinite reverse;
}
@keyframes rotateOuter{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.ge-center{font-size:4.5rem;filter:drop-shadow(0 0 20px rgba(255,106,0,.8));position:relative;z-index:1;}
.ge-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.2em;color:var(--fire);margin-top:.5rem;text-align:center;position:relative;z-index:1;}

.guild-content{flex:1;position:relative;z-index:1;}
